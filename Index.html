<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Нұрай ❤️</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
</head>
<body>

<div class="container">

<h1>Нұрай ❤️</h1>

<p>
Жаным сені мейраммен құттықтаймын,<br>
әрқашан жүзіңнен күлкі кетпесін.<br>
Сені қатты жақсы көремін ❤️
</p>

<!-- Таймер -->
<div id="timer"></div>

<!-- Слайдер -->
<div class="slider">
  <img src="photo1.jpeg" class="slide active">
  <img src="photo2.jpeg" class="slide">
  <img src="photo3.jpeg" class="slide">
  <img src="photo4.jpeg" class="slide">
  <img src="photo5.jpeg" class="slide">
  <img src="photo6.jpeg" class="slide">
</div>

<!-- Конверт -->
<div class="envelope" onclick="openEnvelope()">
  💌
</div>

<!-- Кнопка для салюта -->
<button onclick="fireworks()">Сюрприз 🎆</button>

</div>

<div class="music-player">
<button onclick="playMusic()">🎵 Включить музыку</button>
<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>
</div>

<script src="script.js"></script>
</body>
</html>
